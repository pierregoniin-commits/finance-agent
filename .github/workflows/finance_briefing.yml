on:
  schedule:
    # Tous les jours de semaine (lun-ven) à 7h00 heure de Paris (6h00 UTC)
    - cron: "0 6 * * 1-5"
 
  # Permet de lancer manuellement depuis l'interface GitHub (pour tester)
  workflow_dispatch:
 
jobs:
  send-briefing:
    runs-on: ubuntu-latest
 
    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v3
 
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
 
      - name: 📦 Installation des dépendances
        run: |
          pip install anthropic twilio
 
      - name: 🚀 Lancement de l'agent
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_TO:        ${{ secrets.WHATSAPP_TO }}
        run: |
          python finance_agent.py
 
